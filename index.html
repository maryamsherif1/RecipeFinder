<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RecipeFinder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="hero">
    <h1>🍕 RecipeFinder</h1>
    <p>Type ingredients you have and find recipes instantly</p>
    <div class="search-box">
      <input type="text" id="ingredientInput" placeholder="e.g. chicken, garlic, tomato" />
      <button onclick="searchRecipes()">Find Recipes</button>
    </div>
  </div>

  <div class="results" id="results"></div>

  <script src="script.js"></script>
</body>
</html>
